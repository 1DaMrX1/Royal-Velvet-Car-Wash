<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Preview - ROYAL VELVET</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .preview-container {
            width: 1200px;
            height: 630px;
            background: #030303;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(212,168,83,0.3);
        }
        /* Fundo com gradiente de luz */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(212,168,83,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(212,168,83,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(0,0,0,0.8) 0%, transparent 60%);
        }
        /* Linhas douradas decorativas */
        .line-left {
            position: absolute;
            left: 60px;
            top: 15%;
            bottom: 15%;
            width: 2px;
            background: linear-gradient(180deg, transparent 0%, #d4a853 30%, #f0cc6e 50%, #d4a853 70%, transparent 100%);
            opacity: 0.7;
        }
        .line-top {
            position: absolute;
            top: 40px;
            left: 8%;
            right: 8%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(212,168,83,0.5) 20%, rgba(240,204,110,0.7) 50%, rgba(212,168,83,0.5) 80%, transparent 100%);
        }
        .line-bottom {
            position: absolute;
            bottom: 40px;
            left: 8%;
            right: 8%;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(212,168,83,0.5) 20%, rgba(240,204,110,0.7) 50%, rgba(212,168,83,0.5) 80%, transparent 100%);
        }
        /* Conteúdo central */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 40px;
        }
        /* Ícone diamante */
        .diamond-icon {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(212,168,83,0.5);
            border-radius: 50%;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(212,168,83,0.05);
        }
        .diamond-icon span {
            font-size: 24px;
            color: #d4a853;
            text-shadow: 0 0 20px rgba(212,168,83,0.6);
        }
        /* Nome da marca */
        .brand-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 110px;
            font-weight: 400;
            letter-spacing: 20px;
            line-height: 0.85;
            color: #fff;
            text-shadow: 0 0 100px rgba(255,255,255,0.15), 0 0 30px rgba(255,255,255,0.05);
            margin-bottom: 5px;
        }
        .brand-sub {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 45px;
            letter-spacing: 30px;
            color: #777;
            font-weight: 400;
            margin-bottom: 15px;
        }
        /* Tagline */
        .tagline {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 30px;
        }
        /* Separador */
        .separator {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .sep-line {
            width: 50px;
            height: 1px;
            background: rgba(212,168,83,0.5);
        }
        .sep-diamond {
            width: 8px;
            height: 8px;
            background: #d4a853;
            transform: rotate(45deg);
            box-shadow: 0 0 15px rgba(212,168,83,0.7);
        }
        /* Data */
        .date-big {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 160px;
            font-weight: 400;
            line-height: 0.7;
            background: linear-gradient(180deg, #fff 0%, #f0cc6e 30%, #d4a853 60%, #9a7030 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 50px rgba(212,168,83,0.6)) drop-shadow(0 0 100px rgba(212,168,83,0.3));
            margin-bottom: 5px;
        }
        .date-month {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 35px;
            letter-spacing: 25px;
            color: #ccc;
            margin-bottom: 5px;
        }
        .date-time {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 10px;
            color: #d4a853;
            text-transform: uppercase;
            margin-bottom: 25px;
        }
        /* Preços */
        .prices {
            display: flex;
            gap: 40px;
            align-items: center;
        }
        .price-item {
            text-align: center;
        }
        .price-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 8px;
        }
        .price-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 55px;
            color: #fff;
            line-height: 1;
            letter-spacing: 3px;
        }
        .price-currency {
            font-size: 16px;
            color: #d4a853;
            font-weight: 700;
            letter-spacing: 5px;
            display: block;
        }
        .price-divider {
            width: 1px;
            height: 70px;
            background: rgba(255,255,255,0.1);
        }
        /* Rodapé */
        .footer-text {
            position: absolute;
            bottom: 60px;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-style: italic;
            color: #f0cc6e;
            letter-spacing: 3px;
            text-shadow: 0 0 40px rgba(240,204,110,0.4);
        }
        /* Instruções */
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            z-index: 10;
            border: 1px solid rgba(212,168,83,0.3);
        }
    </style>
</head>
<body>

    <div class="preview-container" id="preview">
        <div class="bg-glow"></div>
        <div class="line-left"></div>
        <div class="line-top"></div>
        <div class="line-bottom"></div>

        <div class="content">
            <!-- Ícone -->
            <div class="diamond-icon">
                <span>✦</span>
            </div>

            <!-- Marca -->
            <div class="brand-name">ROYAL VELVET</div>
            <div class="brand-sub">CAR WASH</div>
            <div class="tagline">Lavagem Profissional · Rápida · Sem Risco</div>

            <!-- Separador -->
            <div class="separator">
                <span class="sep-line"></span>
                <span class="sep-diamond"></span>
                <span class="sep-line"></span>
            </div>

            <!-- Data -->
            <div class="date-big">09</div>
            <div class="date-month">MAIO 2026</div>
            <div class="date-time">A partir das 07:00</div>

            <!-- Preços -->
            <div class="prices">
                <div class="price-item">
                    <div class="price-label">Pequeno Porte</div>
                    <div class="price-value">200</div>
                    <span class="price-currency">MT</span>
                </div>
                <div class="price-divider"></div>
                <div class="price-item">
                    <div class="price-label">Grande Porte</div>
                    <div class="price-value">300</div>
                    <span class="price-currency">MT</span>
                </div>
            </div>
        </div>

        <!-- Garantia no rodapé -->
        <div class="footer-text" style="left:50%;transform:translateX(-50%);">"Se não brilhar, nós repetimos."</div>
    </div>

    <div class="instructions">
        📸 Pressiona <strong>Ctrl + Shift + S</strong> (ou Cmd + Shift + 4 no Mac) para capturar → Guarda como <strong>preview.jpg</strong>
    </div>

</body>
</html>
